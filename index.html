<!DOCTYPE html>
<html>
<head>
  <title>AI Learning Toolkit Pro</title>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; transition: 0.3s; }
    .container { max-width: 800px; margin: auto; }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .primary { background: #4CAF50; color: white; }
    .secondary { background: #333; color: white; }

    pre { padding: 15px; border-radius: 8px; white-space: pre-wrap; }

    body.light { background: #fff; color: #000; }
    body.light pre { background: #f4f4f4; }

    body.dark { background: #121212; color: #eee; }
    body.dark pre { background: #1e1e1e; }
  </style>
</head>

<body class="light">

<div class="container">

  <h1>AI Learning Toolkit Pro</h1>

  <textarea id="input" placeholder="Paste code, error, or concept..."></textarea>

  <br>

  <button class="primary" onclick="analyze()">Analyze</button>
  <button class="secondary" onclick="toggleDarkMode()">Dark Mode</button>
  <button onclick="downloadPDF()">Download PDF</button>

  <p id="type"></p>
  <p id="loading" style="display:none;">Thinking...</p>

  <pre id="output"></pre>

</div>

<script>
let lastOutput = "";

// Detect input type
function detectType(text) {
  if (text.includes("{") || text.includes(";") || text.includes("function")) {
    return "💻 Code detected";
  }
  if (text.toLowerCase().includes("error")) {
    return "⚠️ Error detected";
  }
  return "📘 Concept detected";
}

// Main AI function
async function analyze() {
  const input = document.getElementById("input").value;
  const output = document.getElementById("output");
  const loading = document.getElementById("loading");
  const typeDisplay = document.getElementById("type");

  if (!input.trim()) {
    alert("Enter something!");
    return;
  }

  typeDisplay.innerText = detectType(input);

  loading.style.display = "block";
  output.innerText = "";

  try {
  const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer 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",
      "Content-Type": "application/json",
      "HTTP-Referer": "http://localhost",
      "X-Title": "AI Learning Toolkit"
    },
    body: JSON.stringify({
      model: "meta-llama/llama-3-8b-instruct",
      messages: [
        {
          role: "user",
          content: `Explain this simply: ${input}`
        }
      ]
    })
  });

  const data = await response.json();

  console.log("FULL RESPONSE:", data);

  if (data.error) {
    throw new Error(data.error.message);
  }

  if (!data.choices) {
    throw new Error("No choices returned");
  }

  lastOutput = data.choices[0].message.content;
  output.innerText = lastOutput;

} catch (err) {
  output.innerText = "Error: " + err.message;
}
    if (!data.choices || !data.choices[0]) {
      console.log(data);
      throw new Error("Bad API response");
    }

    lastOutput = data.choices[0].message.content;
 

  loading.style.display = "none";
}

// Dark mode
function toggleDarkMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

// PDF
function downloadPDF() {
  if (!lastOutput) {
    alert("Generate something first!");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const lines = doc.splitTextToSize(lastOutput, 180);
  doc.text(lines, 10, 10);

  doc.save("AI_Learning_Output.pdf");
}
</script>

</body>
</html>
